services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bounswe_db}
      POSTGRES_USER: ${POSTGRES_USER:-genipe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genipe_mvp_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-genipe} -d ${POSTGRES_DB:-bounswe_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./app/backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-secret-do-not-use-in-prod}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://genipe.app,https://www.genipe.app}
      POSTGRES_DB: ${POSTGRES_DB:-bounswe_db}
      POSTGRES_USER: ${POSTGRES_USER:-genipe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genipe_mvp_2026}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      # Optional S3-compatible object storage. Leave empty to use the local
      # media_data volume; set AWS_STORAGE_BUCKET_NAME (and the rest) in .env
      # to switch DEFAULT_FILE_STORAGE to S3Boto3Storage.
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-ewr1}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # /admin/login/ renders without hitting the DB, so this is a clean
    # liveness probe for gunicorn. urlopen raises on non-2xx, exiting non-zero.
    # start_period covers migrate + collectstatic, which gunicorn starts after.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/login/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./app/frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost}
        REACT_APP_USE_MOCK: "false"
    ports:
      - "80:80"
    volumes:
      - media_data:/var/www/media:ro
      - static_data:/var/www/django-static:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # NOTE: prod overrides this — see docker-compose.prod.yml. The prod nginx
    # config (ops/nginx-prod.conf) only listens on 0.0.0.0 and :80 redirects
    # to https, so this plain-http check only works for the dev/default image.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  media_data:
  static_data:
