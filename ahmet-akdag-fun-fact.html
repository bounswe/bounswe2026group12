<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Fun Fact - Ahmet Akdag</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 48px 40px;
      text-align: center;
    }
    h1 { font-size: 1.875rem; color: #1e293b; margin-bottom: 24px; }
    #fact { font-size: 1.25rem; color: #334155; margin-bottom: 24px; }
    #loading { color: #64748b; font-size: 1.1rem; }
    h3 { color: #1e293b; margin-bottom: 8px; }
    p { color: #64748b; margin-bottom: 24px; }
    pre {
      text-align: left;
      background: #f4f4f4;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.85rem;
    }
    .back-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      background-color: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
    .back-btn:hover { background-color: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Random Fun Fact</h1>
    <p id="loading">Loading...</p>
    <p id="fact"></p>
    <hr style="margin-bottom: 24px;">
    <h3>What does this API return?</h3>
    <p>The <b>Useless Facts API</b> returns a random fun fact from a curated database. Each response includes the fact text, its source URL, and language info.</p>
    <h4 style="margin-bottom: 8px;">Raw API Response:</h4>
    <pre id="raw"></pre>
    <a href="index.html" class="back-btn">Back</a>
  </div>

  <script>
    fetch("https://uselessfacts.jsph.pl/api/v2/facts/random?language=en")
      .then(res => res.json())
      .then(data => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("fact").textContent = data.text;
        document.getElementById("raw").textContent = JSON.stringify(data, null, 2);
      });
  </script>
</body>
</html>
