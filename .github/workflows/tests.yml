# Local equivalents:
#   cd app/backend && python manage.py test
#   cd app/frontend && npm test -- --watchAll=false

name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: app/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: app/backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run Django test suite
        run: python manage.py test --noinput --verbosity=2

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: app/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Jest test suite
        env:
          CI: 'true'
        run: npm test -- --watchAll=false --ci --passWithNoTests
