# Local equivalents:
#   cd app/backend && coverage run --source=apps manage.py test --parallel auto && coverage combine && coverage report --omit='*/migrations/*,*/tests*'
#   cd app/frontend && npm test -- --watchAll=false --coverage

name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: app/backend/requirements.txt

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt
          pip install coverage==7.13.5

      - name: Run Django test suite
        # --parallel auto fans the suite across the runner's CPUs (~2x on the
        # 2-core GitHub runner). .coveragerc has concurrency=multiprocessing so
        # subprocess coverage is captured; `coverage combine` merges it below.
        run: coverage run --source=apps manage.py test --noinput --parallel auto

      - name: Backend coverage report
        if: always()
        run: |
          coverage combine || true
          echo "## Backend coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          coverage report --omit='*/migrations/*,*/tests*' --skip-empty | tail -25 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: app/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Jest test suite
        env:
          CI: 'true'
        run: npm test -- --watchAll=false --ci --passWithNoTests --coverage --coverageReporters=text --coverageReporters=json-summary

      - name: Frontend coverage report
        if: always()
        working-directory: app/frontend
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Frontend coverage" >> "$GITHUB_STEP_SUMMARY"
            echo '| Metric | Pct | Covered / Total |' >> "$GITHUB_STEP_SUMMARY"
            echo '|---|---|---|' >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const t = require('./coverage/coverage-summary.json').total;
              for (const k of ['statements','branches','functions','lines']) {
                const m = t[k];
                console.log(\`| \${k} | \${m.pct.toFixed(2)}% | \${m.covered} / \${m.total} |\`);
              }
            " >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Frontend coverage summary not produced (tests likely failed before instrumenting)." >> "$GITHUB_STEP_SUMMARY"
          fi
